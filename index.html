<!DOCTYPE html>
<html>

<head>
<title>Kpop Database</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

header{
background:#1c1c1c;
padding:15px;
display:flex;
justify-content:space-between;
}

.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.card{
background:#1c1c1c;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<header>
<h1>Kpop Database</h1>
<input placeholder="Search idol">
</header>

<section class="cards">

<div class="card">
<img src="https://i.imgur.com/6VBx3io.jpeg">
<h3>Jennie</h3>
<p>BLACKPINK</p>
</div>

<div class="card">
<img src="https://i.imgur.com/zp5Yw9B.jpeg">
<h3>Karina</h3>
<p>aespa</p>
</div>

</section>

</body>

</html>
